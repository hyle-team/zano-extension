name: Security

on:
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read
  pull-requests: write

jobs:
  # Layer 1 — deterministic guard. No secret, no cost. Runs on every PR and
  # release. Fails the build if a known trust-boundary footgun reappears.
  guard:
    name: Pattern guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Security pattern guard
        run: bash scripts/security-guard.sh

  # Detects whether an Anthropic key is configured, so the AI job can self-skip
  # when it isn't (e.g. before the secret is added, or on forked PRs where
  # secrets are unavailable). Keeps CI green instead of erroring.
  ai-key-present:
    name: Check AI key
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - id: check
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          if [ -n "$CLAUDE_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_API_KEY not set — AI security review skipped."
          fi

  # Layer 2 — AI security review on the PR diff. Only on pull requests, and only
  # when the key exists. Diff-based, so it has nothing to review on a release.
  ai-review:
    name: AI security review
    needs: ai-key-present
    if: ${{ github.event_name == 'pull_request' && needs.ai-key-present.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
      - uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          # If the action's bundled Claude Code rejects this id, drop the line
          # to use its default, or pin claude-sonnet-4-6 for cheaper runs.
          claude-model: claude-opus-4-8
          comment-pr: true
          exclude-directories: build,node_modules,.context
